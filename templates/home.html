<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">📝 My Notes</h1>

    <!-- Add Note Card -->
    <div class="card shadow p-4 mb-4">
        <form action="/add" method="POST">
            <input class="form-control mb-3" type="text" name="title" placeholder="Title" required>
            <textarea class="form-control mb-3" name="content" placeholder="Content" required></textarea>
            <button class="btn btn-primary w-100">Add Note</button>
        </form>
    </div>

    <!-- Notes List -->
    <div class="row">
        {% for note in notes %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm note-card">
                <div class="card-body">
                    <h5 class="card-title">{{ note[1] }}</h5>
                    <p class="card-text">{{ note[2] }}</p>
                    <a href="/delete/{{ note[0] }}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
